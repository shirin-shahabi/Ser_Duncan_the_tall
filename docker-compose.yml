services:
  gateway:
    build: .
    container_name: serdunken_gateway
    ports:
      - "3000:3000"
    environment:
      - ENABLE_DSPERSE_PROOF=0
    volumes:
      - ./data:/app/data

  loki:
    image: grafana/loki:3.0.0
    container_name: serdunken_loki
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./monitoring/loki/local-config.yml:/etc/loki/local-config.yml:ro
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: serdunken_promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./data:/var/log/guard:ro
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: serdunken_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: serdunken_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - loki
      - prometheus
